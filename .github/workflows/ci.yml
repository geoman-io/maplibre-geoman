name: CI

on:
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: "24"

jobs:
  # Separate job for faster feedback on basic checks
  quick-checks:
    name: Quick Checks
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Formatter checks
        run: pnpm run formatter

      - name: TypeScript checks
        run: pnpm run typecheck:all

      - name: Oxlint checks
        run: pnpm run lint:all

      - name: Workspace validation
        run: pnpm run workspace:validate

      - name: Core unit tests
        run: pnpm run test:unit

      - name: Check package.json and lock file sync
        run: |
          pnpm install --frozen-lockfile

  # Build job with caching
  build:
    name: Build & Type Check
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        variant: [maplibre, mapbox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache variant dist folder
        id: cache-dist
        uses: actions/cache@v5
        with:
          path: packages/${{ matrix.variant }}/dist
          key: dist-${{ runner.os }}-${{ matrix.variant }}-${{ github.sha }}

      - name: Build project (${{ matrix.variant }})
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: |
          if [[ "${{ matrix.variant }}" == "mapbox" ]]; then
            pnpm --filter @geoman-io/mapbox-geoman-free run build
          else
            pnpm --filter @geoman-io/maplibre-geoman-free run build
          fi

      - name: Verify build artifacts (${{ matrix.variant }})
        run: |
          test -f packages/${{ matrix.variant }}/dist/${{ matrix.variant }}-geoman.es.js
          test -f packages/${{ matrix.variant }}/dist/${{ matrix.variant }}-geoman.umd.js
          test -f packages/${{ matrix.variant }}/dist/${{ matrix.variant }}-geoman.d.ts

      - name: API surface check (${{ matrix.variant }})
        run: node scripts/check-api-surface.mjs --variant ${{ matrix.variant }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ matrix.variant }}
          path: packages/${{ matrix.variant }}/dist/
          retention-days: 7

  # Test job with Playwright
  test:
    name: Test Suite
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master' }}
    runs-on: large-test-runner
    timeout-minutes: 60
    needs: [quick-checks]

    strategy:
      matrix:
        browser: [chromium]
        variant: [maplibre, mapbox]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Use runner Chromium
        run: |
          for browser in google-chrome-stable google-chrome chromium chromium-browser; do
            if command -v "$browser" >/dev/null 2>&1; then
              echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$(command -v "$browser")" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "No system Chromium/Chrome executable found on large-test-runner"
          exit 1

      - name: Run Playwright tests
        run: |
          if [[ "${{ matrix.variant }}" == "mapbox" ]]; then
            pnpm run test:mapbox --project=${{ matrix.browser }}
          else
            pnpm run test:maplibre --project=${{ matrix.browser }}
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.variant }}
          path: playwright-report/
          retention-days: 7

  # Security scanning
  security:
    name: Security Scan
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  # Final check job that depends on all others
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quick-checks, build, test, security]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/master') }}

    steps:
      - name: Check all jobs success
        run: |
          if [[ "${{ needs.quick-checks.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.security.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed successfully"
